user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log  /var/log/nginx/access.log  main;

  sendfile        on;
  keepalive_timeout  65;

  upstream backend_upstream {
    server backend:3000;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location /api/ {
      proxy_pass http://backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      proxy_pass http://backend_upstream/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
      proxy_pass http://backend_upstream/uploads/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass http://backend_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      alias /usr/share/nginx/html/admin/;
      try_files $uri $uri/ /admin/index.html;
    }

    location = /kiosk {
      return 301 /kiosk/;
    }

    location = /kiosk/index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/kiosk/index.html;
    }

    location = /kiosk/flutter_service_worker.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/kiosk/flutter_service_worker.js;
    }

    location = /kiosk/flutter_bootstrap.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/kiosk/flutter_bootstrap.js;
    }

    location = /kiosk/main.dart.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/kiosk/main.dart.js;
    }

    location /kiosk/ {
      alias /usr/share/nginx/html/kiosk/;
      try_files $uri $uri/ /kiosk/index.html;
    }

    location = /counter {
      return 301 /counter/;
    }

    location = /counter/index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/counter/index.html;
    }

    location = /counter/flutter_service_worker.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/counter/flutter_service_worker.js;
    }

    location = /counter/flutter_bootstrap.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/counter/flutter_bootstrap.js;
    }

    location = /counter/main.dart.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      alias /usr/share/nginx/html/counter/main.dart.js;
    }

    location /counter/ {
      alias /usr/share/nginx/html/counter/;
      try_files $uri $uri/ /counter/index.html;
    }

    location = / {
      return 302 /admin/;
    }
  }
}
